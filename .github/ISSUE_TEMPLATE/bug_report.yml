name: Bug report
description: Report a reproducible problem in the API or insight engine
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a focused, reproducible issue. Remove tokens and private profile data before submitting.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest safe sequence of commands or public-data fixture that reproduces the problem.
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: v20.15.0
    validations:
      required: true
  - type: dropdown
    id: boundary
    attributes:
      label: Affected boundary
      options:
        - Insight engine
        - GitHub API client
        - MySQL persistence
        - HTTP API
        - Documentation
    validations:
      required: true
  - type: textarea
    id: checks
    attributes:
      label: Checks run
      description: Include `npm run lint`, `npm test`, or the relevant smoke-test result.
  - type: checkboxes
    id: safety
    attributes:
      label: Public-data safety
      options:
        - label: I removed access tokens, private profile exports, and database credentials.
          required: true
